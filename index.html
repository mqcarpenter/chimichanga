<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reading Wrangler</title>
    <!-- PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wrangler">
    <meta name="theme-color" content="#3E2723">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Cowboy themed fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <nav class="top-nav wood-panel">
            <div class="logo">
                <i class="fa-solid fa-hat-cowboy"></i>
                <h1>Reading Wrangler</h1>
            </div>
            <div class="nav-actions">
                <button id="add-book-btn" class="leather-btn"><i class="fa-solid fa-plus"></i> Lasso a Book</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search / Add Book Modal Overlay -->
            <div id="search-modal" class="modal hidden">
                <div class="modal-content parchment-bg">
                    <span class="close-btn">&times;</span>
                    <h2>Search the Trail (Google Books)</h2>
                    <div class="search-bar">
                        <input type="text" id="google-search-input" placeholder="Enter title or author (e.g., Lonesome Dove)">
                        <button id="google-search-btn" class="leather-btn"><i class="fa-solid fa-search"></i> Search</button>
                    </div>
                    <div id="search-results" class="results-grid"></div>
                </div>
            </div>

            <!-- Similar Finds Modal -->
            <div id="similar-modal" class="modal hidden">
                <div class="modal-content parchment-bg">
                    <span class="close-btn" id="close-similar-btn">&times;</span>
                    <h2>Similar Finds</h2>
                    <p class="subtitle">Here’s some books similar to <span id="similar-target-title" style="font-weight:bold;"></span></p>
                    <div id="similar-results" class="results-grid"></div>
                    <div class="modal-footer">
                        <button id="cycle-similar-btn" class="leather-btn secondary"><i class="fa-solid fa-rotate-right"></i> Cycle More</button>
                    </div>
                </div>
            </div>

            <!-- Currently Reading Section -->
            <section class="book-section">
                <h2 class="section-title"><i class="fa-solid fa-fire"></i> Currently Reading</h2>
                <div id="currently-reading-grid" class="book-list">
                    <p class="empty-msg">No books currently on the trail.</p>
                </div>
            </section>

            <!-- Library / Corral -->
            <section class="book-section">
                <h2 class="section-title"><i class="fa-solid fa-book-journal-whills"></i> The Corral (To Read & Read)</h2>
                <div id="corral-grid" class="book-list">
                    <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Rounding up books...</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
